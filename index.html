---
layout: default
---

<div class="container">
  <h1 class="site-title">{{ site.title }}</h1>
  <p class="tagline">{{ site.description }}</p>

  <section class="links">
    {% for link in site.links %}
    <a href="{{ link.url }}" class="link-block" target="_blank" rel="noopener">
      {{ link.title }}
    </a>
    {% endfor %}
  </section>

  <section class="socials">
    <p class="footer-text">See more @ <a href="https://llcprojects.com" class="social-link" target="_blank" rel="noopener">llcprojects.com</a></p>
  </section>
</div>
